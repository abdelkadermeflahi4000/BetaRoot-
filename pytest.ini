# pytest.ini
[pytest]
addopts = -q --tb=short --hypothesis-show-statistics

# إعدادات Hypothesis العامة
hypothesis.max_examples = 300
hypothesis.deadline = 800
hypothesis.suppress_health_check = too_slow,filter_too_much
hypothesis.report_multiple_bugs = false
hypothesis.verbosity = normal

# إعدادات خاصة للاختبارات البطيئة
markers =
    slow: tests that take longer time (deselect with -m "not slow")

# مسارات الاختبارات
testpaths = tests
python_files = test_*.py
python_classes = Test* 
python_functions = test_*

# تغطية الكود (اختياري)
addopts = 
    -q 
    --tb=short 
    --hypothesis-show-statistics 
    --cov=betaroot 
    --cov-report=term-missing
    --cov-report=html:coverage_html

# تجاهل بعض التحذيرات
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
