# .github/workflows/ci-cd.yml
name: BetaRoot CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]

# الصلاحيات الدنيا المطلوبة (Principle of Least Privilege)
permissions:
  contents: read
  id-token: write   # مطلوب للنشر الآمن إلى PyPI بدون رموز سرية
  packages: write   # للسجل الخاص بـ GitHub Container Registry (اختياري)

jobs:
  # ==========================================
  # 🧪 1. الفحص والاختبار متعدد الإصدارات
  # ==========================================
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 🧹 Run Linter & Formatter Check (Ruff)
        run: ruff check betaroot/ tests/ --output-format=github

      - name: 🧪 Run Unit & Integration Tests
        run: pytest tests/ -v --tb=short --cov=betaroot --cov-report=xml

      - name: 📊 Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # اختياري إذا كان المستودع عام

  # ==========================================
  # 🐳 2. بناء واختبار حاوية Docker
  # ==========================================
  docker:
    name: 🐳 Build & Verify Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐋 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Image with Cache
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: betaroot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Verify Runtime
        run: |
          docker run --rm betaroot:ci python -c "import betaroot; print('✅ BetaRoot core loaded in Docker')"
          docker run --rm betaroot:ci betaroot-cli --help || echo "⚠️ CLI entry point optional"

  # ==========================================
  # 📦 3. النشر إلى PyPI (عند إنشاء Release فقط)
  # ==========================================
  publish-pypi:
    name: 🚀 Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Install Build Tools
        run: pip install build

      - name: 📦 Build Distribution (sdist + wheel)
        run: python -m build

      - name: 🌐 Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
